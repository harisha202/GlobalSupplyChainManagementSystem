<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Global Supply Chain favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#0c3352" />
    </linearGradient>

    <!-- Orbit ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Inner globe glow -->
    <radialGradient id="globeGlow" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e4a6e" />
      <stop offset="100%" stop-color="#071020" />
    </radialGradient>

    <!-- Node glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Clip for rounded rect -->
    <clipPath id="roundedClip">
      <rect x="6" y="6" width="116" height="116" rx="28" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#bg)" filter="url(#shadow)" />

  <!-- Subtle grid texture overlay -->
  <g clip-path="url(#roundedClip)" opacity="0.06">
    <line x1="6" y1="26" x2="122" y2="26" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="6" y1="46" x2="122" y2="46" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="6" y1="66" x2="122" y2="66" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="6" y1="86" x2="122" y2="86" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="6" y1="106" x2="122" y2="106" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="26" y1="6" x2="26" y2="122" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="46" y1="6" x2="46" y2="122" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="66" y1="6" x2="66" y2="122" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="86" y1="6" x2="86" y2="122" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="106" y1="6" x2="106" y2="122" stroke="#22d3ee" stroke-width="0.5"/>
  </g>

  <!-- Globe fill -->
  <circle cx="64" cy="64" r="36" fill="url(#globeGlow)" clip-path="url(#roundedClip)" />

  <!-- Globe latitude lines (subtle) -->
  <g clip-path="url(#roundedClip)" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.2">
    <ellipse cx="64" cy="64" rx="36" ry="14" />
    <ellipse cx="64" cy="64" rx="36" ry="26" />
    <line x1="64" y1="28" x2="64" y2="100" />
    <line x1="28" y1="64" x2="100" y2="64" />
  </g>

  <!-- Globe outline -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#1e6a8a" stroke-width="1" opacity="0.6" />

  <!-- Orbit ring — dashed arc -->
  <circle
    cx="64" cy="64" r="50"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="200 114"
    transform="rotate(-30 64 64)"
    opacity="0.9"
  />

  <!-- Second thinner orbit arc -->
  <circle
    cx="64" cy="64" r="50"
    fill="none"
    stroke="#22d3ee"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-dasharray="80 234"
    transform="rotate(155 64 64)"
    opacity="0.3"
  />

  <!-- Connection lines from center globe to nodes -->
  <line x1="64" y1="64" x2="32" y2="48" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5" />
  <line x1="64" y1="64" x2="90" y2="26" stroke="#34d399" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5" />
  <line x1="64" y1="64" x2="102" y2="88" stroke="#a7f3d0" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5" />

  <!-- Node 1 — left -->
  <circle cx="32" cy="48" r="7" fill="#0a1628" stroke="#22d3ee" stroke-width="2" filter="url(#glow)" />
  <circle cx="32" cy="48" r="3.5" fill="#22d3ee" opacity="0.9" />

  <!-- Node 2 — top right -->
  <circle cx="90" cy="26" r="7" fill="#0a1628" stroke="#34d399" stroke-width="2" filter="url(#glow)" />
  <circle cx="90" cy="26" r="3.5" fill="#34d399" opacity="0.9" />

  <!-- Node 3 — bottom right -->
  <circle cx="102" cy="88" r="7" fill="#0a1628" stroke="#a7f3d0" stroke-width="2" filter="url(#glow)" />
  <circle cx="102" cy="88" r="3.5" fill="#a7f3d0" opacity="0.9" />

  <!-- Chain/route icon in globe center — refined arrow-loop -->
  <path
    d="M52 70c0-6.6 5.4-12 12-12h11M82 55v22H64c-6.6 0-12-5.4-12-12"
    fill="none"
    stroke="#f0fdfa"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow tip top -->
  <polyline
    points="71,49 75,58 65,58"
    fill="none"
    stroke="#f0fdfa"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>